
      <svg className="empty-cart-animation" viewBox="656 573 264 182" overflow="visible" version="1.1" xmlns="http://www.w3.org/2000/svg">

              <style>

            .emptyCartContainer h3 {
                color: #242424;
            }

            .emptyCartContainer button {
                font-size: 0.875rem;
                color: var(--dark-text-primary);
                padding: 8px 30px;
                background-color: var(--primary);
                border-radius: 20px;
                transition: all 0.2s ease-in-out;
            }

            .emptyCartContainer button:hover {
            color: #fff;
                background-color: var(--primary-hover);
            }

            
            .emptyCartContainer {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                row-gap: 20px;
                width: 100%;
                min-height: calc(100dvh - 300px);
                max-height: 100%;
            }

            .emptyCartDiv {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 100%;
                max-width: 500px;
            }
            
            #Fill-10, #Fill-33 {
                fill: var(--primary);
            }
            
            #bg-line {
                fill: var(--primary-hover);
            }

            #bag-main {
                fill: var(--primary-hover);
            }

            #bag-light {
                fill: hsl(171, 100%, 46%);
            }

            #Fill-14, #Fill-15 {
                fill: #42d1bc;
            }

            #Stroke-4916, #Stroke-4917, #Stroke-4922, #Stroke-4923, #Stroke-4928, #Stroke-4929, #Stroke-4930, #Stroke-4931, #Stroke-4932, #Stroke-4933 {
                stroke: #242424;
            }
            

            #glow {
                fill: #242424;
            }

            #plus {
                fill: #ff2939;
            }
                            
            #plus-1 {
                fill: #bf72f3;
            }

            #plus-2, #oval-1, #oval-5 {
                fill: #ffae00;
            }

            #oval-10 {
                stroke: #29a847;
            }
               #oval-2, #oval-3 {
                   fill: #29a847;
              }
            #oval, #oval-6, #oval-4 {
                fill: var(--blue);
            }

            #oval-7 {
                stroke: #bf72f3;
            }

            #oval-8 {
                stroke: #ffae00;
            }
            
            #diamond {
                stroke: #ff6b6b;
            }
            
            #bubble-rounded {
                stroke: #29a847
            }
            
            
           </style>


