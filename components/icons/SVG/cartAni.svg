<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_2" data-name="Layer 2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 129 94.83">
  <defs>
    <style>
      .hide {
      fill: red;
}

.animate-zip, .animate-open-zip, .animate-top-zip {
  animation-duration: 10s;
  animation-iteration-count: infinite;
  animation-timing-function: ease-in-out;
}

/* 1. THE SLIDE (Fast return) */
.animate-zip {
  animation-name: slideZip;
}

@keyframes slideZip {
  0% { cx: 55.8; cy: 78.18; }
  15%, 75% { cx: 69.8; cy: 78.18; } /* Reaches end fast, stays through pause */
  85%, 100% { cx: 55.8; cy: 78.18; } /* Returns in 1s (75% to 85%), then waits */
}

/* 2. THE HANDLE POP */
.animate-open-zip {
  animation-name: expandEllipse;
}

@keyframes expandEllipse {
  0%, 15% { 
    cx: 63.11; cy: 76.41; rx: 6.54; ry: 0.08; 
  }
  25%, 65% { /* Open state during the 4s pause */
    cx: 63.08; cy: 76.9; rx: 6.56; ry: 2.59; 
  }
  75%, 100% { 
    cx: 63.11; cy: 76.41; rx: 6.54; ry: 0.08; 
  }
}

/* 3. THE TOP PATH (Morph) */
.animate-top-zip {
  animation-name: morphTop;
}

@keyframes morphTop {
  0%, 15% { 
    d: path("M53.77,59.87c1.82-2.95,5.35-4.83,9.22-4.9,5.99-.1,9.17,4.22,9.31,4.41"); 
  }
  25%, 65% { 
    d: path("M53.77,59.87c1.82-1.64,5.35-2.68,9.22-2.71,5.99-.06,9.17,2.34,9.31,2.45"); 
  }
  75%, 100% { 
    d: path("M53.77,59.87c1.82-2.95,5.35-4.83,9.22-4.9,5.99-.1,9.17,4.22,9.31,4.41"); 
  }
